<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vedant High School | Excellence in Education</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="icon" type="image/png" href="/assets/logo-Bd5M4GF0.png">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#313E67', // Professional Navy Blue
            secondary: '#FFFFFF', // White
            accent: '#004875', // Brand Blue
            brandRed: '#E21E26', // Vibrant Red
            brandOrange: '#F58220', // School Orange
            brandYellow: '#FFD700', // Education Yellow
            brandViolet: '#8B5CF6',
            softBg: '#F8FAFC',
            navyLight: '#4B5C8C'
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Poppins', 'sans-serif'],
          }
        },
      },
    };
  </script>
  <style>
    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #FFFFFF;
      color: #1a202c;
      /* Hide default cursor globally */
      cursor: none !important;
    }

    /* Ensure interactive elements also hide the cursor so the custom one is always visible */
    a,
    button,
    input,
    select,
    textarea,
    [role="button"] {
      cursor: none !important;
    }

    .font-display {
      font-family: 'Poppins', sans-serif;
    }

    .animate-fade-in {
      animation: fadeIn 0.8s ease-out;
    }

    .bg-multi-gradient {
      background: linear-gradient(135deg, #E21E26 0%, #F58220 50%, #FFD700 100%);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
